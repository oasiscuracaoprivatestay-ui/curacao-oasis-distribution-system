<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curacao Oasis Distribution System</title>
  <meta name="description" content="Human-assisted Facebook group marketing system for Curacao Oasis vacation rentals. Prepare, plan, copy, and track posts manually." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

<div class="app-wrapper">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand-logo">
        <span class="logo-wave">🌊</span>
        <div class="brand-text">
          <span class="brand-name">Curacao Oasis</span>
          <span class="brand-sub">Distribution System</span>
        </div>
      </div>
      <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <nav class="nav-menu" role="navigation" aria-label="Main navigation">
      <ul>
        <li class="nav-item active" data-view="dashboard" id="nav-dashboard">
          <span class="nav-icon">📊</span>
          <span class="nav-label">Dashboard</span>
        </li>
        <li class="nav-item" data-view="content" id="nav-content">
          <span class="nav-icon">📝</span>
          <span class="nav-label">Content Library</span>
        </li>
        <li class="nav-item" data-view="groups" id="nav-groups">
          <span class="nav-icon">👥</span>
          <span class="nav-label">Facebook Groups</span>
        </li>
        <li class="nav-item" data-view="plan" id="nav-plan">
          <span class="nav-icon">📅</span>
          <span class="nav-label">Daily Plan</span>
        </li>
        <li class="nav-item" data-view="assistant" id="nav-assistant">
          <span class="nav-icon">✉️</span>
          <span class="nav-label">Posting Assistant</span>
        </li>
        <li class="nav-item" data-view="history" id="nav-history">
          <span class="nav-icon">📜</span>
          <span class="nav-label">History</span>
        </li>
        <li class="nav-item" data-view="settings" id="nav-settings">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label">Settings</span>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <div class="manual-badge">
        <span class="status-dot"></span>
        <span>Manual Posting Mode</span>
      </div>
      <div class="sidebar-version">v1.0 · Human-Assisted Only</div>
    </div>
  </aside>

  <!-- ── Main Content ── -->
  <main class="main-content" id="mainContent">
    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer" aria-live="polite"></div>

    <!-- Views -->
    <section id="view-dashboard" class="view active" aria-label="Dashboard"></section>
    <section id="view-content" class="view" aria-label="Content Library"></section>
    <section id="view-groups" class="view" aria-label="Facebook Groups"></section>
    <section id="view-plan" class="view" aria-label="Daily Plan"></section>
    <section id="view-assistant" class="view" aria-label="Posting Assistant"></section>
    <section id="view-history" class="view" aria-label="History"></section>
    <section id="view-settings" class="view" aria-label="Settings"></section>
  </main>
</div>

<!-- ── Global Modal ── -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose" aria-label="Close modal">&times;</button>
    <div class="modal-header" id="modalHeader">
      <h2 class="modal-title" id="modalTitle"></h2>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ── Scripts (order matters — no ES modules for file:// compat) ── -->
<script src="js/store.js"></script>
<script src="js/engine.js"></script>
<script src="js/planner.js"></script>
<script src="js/tracker.js"></script>
<script src="js/exporter.js"></script>
<script src="js/importer.js"></script>
<script src="js/views.js"></script>
<script src="js/app.js"></script>

</body>
</html>
